<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ディオッサ出雲クイズ</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="images/icon-192.png">
<link rel="apple-touch-icon" href="images/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css?v=2">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TRM6KD9XGZ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-TRM6KD9XGZ');
</script>

</head>

<body>

<div class="container">

<h2 id="title"></h2>

<div class="modeWrap">

<button id="normalBtn" class="mode active"
onclick="setMode('normal')">
通常
</button>

<button id="numberBtn" class="mode"
onclick="setMode('number')">
背番号
</button>

<button id="positionBtn" class="mode"
onclick="setMode('position')">
ポジション
</button>
  
<button id="callBtn" class="mode"
onclick="setMode('call')">
コール名
</button>

<button id="birthplaceBtn" class="mode"
onclick="setMode('birthplace')">
出身地
</button>

<button id="joinYearBtn" class="mode"
onclick="setMode('joinYear')">
何年目
</button>
  
<button id="companyBtn" class="mode"
onclick="setMode('company')">
所属先
</button>

<button id="faceBtn" class="mode"
onclick="setMode('face')">
似顔絵
</button>

</div>

<div class="card">

<div id="progress"></div>

<div id="retryBanner"></div>

<div id="result"></div>

<div id="photoArea"></div>

<p id="qWrap">
<span id="q"></span>
</p>

<div id="choices"></div>

</div>

<div class="topButtons">
  <button id="topBtn">トップへ戻る</button>
</div>

<div class="weakButtons">
  <button
    id="clearWeakBtn"
    onclick="clearWeakData()"
    style="display:none;">
    苦手問題を初期化
  </button>
</div>

</div>

<!-- 確認ダイアログ -->
<div id="confirmBox" class="confirmBox">

<div class="confirmCard">

<h3>苦手問題を初期化</h3>

<p>
苦手問題を<br>
すべて削除しますか？
</p>

<button id="cancelClearBtn" class="quizBtn">
キャンセル
</button>

<button id="okClearBtn" class="quizBtn danger">
削除する
</button>

</div>

</div>

<script src="data/introQuestions.js"></script>
<script src="./data/quiz2026.js"></script>
<script src="./script.js?v=2"></script>

</body>
</html>
